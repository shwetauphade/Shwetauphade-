<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>list example</title>
</head>
<body>
    <h1><b>ordered list</b></h1>
    <ol>
        <li>c</li>
        <li>c++</li>
        <li>java</li>
        <li>python</li>
    </ol>
    <ol type="A">
        <li>item 1</li>
        <li>item 2</li>
</ol>
<h2>unorder list</h2>
<ul>
    <li>HTML</li>
    <li>dotnet</li>
    <li>react</li>
    <li>c#</li>
</ul>
<ul type="circle">
    <li>shruti </li>
    <li>shweta</li>
    <li>shrushti</li>
</ul>
<h2>description list</h2>
<dl>
    <dt>HTML</dt>
    <dd>hypertext markup language</dd>
    <dt>CSS</dt>
    <dd>cascading style sheets</dd>

</dl>

</body>
</html>
