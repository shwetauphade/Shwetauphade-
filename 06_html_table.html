<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML table example</title>
</head>
<body>
    <h1>student marksheet</h1>
    <table border="1" cellspacing="0" cellpadding="15">
        <tr>
            <th>sr.no</th>
            <th>subject</th>
            <th>maximum mark</th>
            <th>mark obtained</th>
        </tr>
        <tr>
            <td>1</td>
            <td>marathi</td>
            <td>100</td>
            <td>95</td>
            
        </tr>
        <tr>
            <td>2</td>
            <td>english</td>
            <td>100</td>
            <td>86</td>
        </tr>
        <tr>
            <td>3</td>
            <td>sanskrit</td>
            <td>100</td>
            <td>99</td>
        </tr>
        <tr>
             <td>4</td>
            <td>math</td>
            <td>100</td>
            <td>91</td>
        </tr>
        <tr>
             <td>5</td>
            <td>science</td>
            <td>100</td>
            <td>93</td>
        </tr>
        <tr>
           <td>6</td>
            <td>his,geo</td>
            <td>100</td>
            <td>98</td> 
        </tr>
        <tr>
            <th colspan="2">total</th>
            <th>500</th>
            <th>475</th>
            
        </tr>
        <tr>
            <th colspan="3">percentage</th>
            <th colspan="2">89%</th>
        </tr>
        <tr>
            <th colspan="3">result</th>
             <th colspan="2">pass</th>
        </tr>

    </table>
</body>
</html>
